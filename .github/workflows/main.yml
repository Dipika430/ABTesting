name: A/B Testing CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Install Dependencies
      run: |
        pip install fastapi uvicorn scikit-learn

    - name: Train Models
      run: |
        python train_model.py

    - name: Run Basic Test
      run: |
        python -c "import pickle; pickle.load(open('model_A.pkl','rb'))"

    - name: Start Server (Test)
      run: |
        uvicorn app:app --host 0.0.0.0 --port 8000 &
        sleep 5
